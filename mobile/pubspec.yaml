name: anime_ai_player
description: SynapseAnime - Mobile app for anime streaming with AI recommendations

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^12.0.0

  # HTTP & API
  dio: ^5.4.3+1
  google_sign_in: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Video Player
  video_player: ^2.8.6

  # WebView (for vidsrc.to embeds)
  webview_flutter: ^4.7.0

  # Player gesture controls
  screen_brightness: ^1.0.1
  volume_controller: ^2.0.7

  # Firebase
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.0
  equatable: ^2.0.5

  # Additional utilities
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  http: ^1.2.1

  # Internationalization
  flutter_localizations:
    sdk: flutter

  # Animations
  rive: ^0.13.4
  lottie: ^3.1.2
  liquid_swipe: ^3.0.1
  cristalyse: ^1.17.2
  carousel_slider: ^5.0.0
  file_picker: ^8.0.0 # Downgrade to safe version
  permission_handler: ^11.3.1
  path: ^1.9.0
  fl_chart: ^1.1.1
  socket_io_client: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  mockito: ^5.4.4
  build_test: ^2.2.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

