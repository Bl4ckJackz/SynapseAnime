name: anime_ai_player
description: SynapseAnime - Mobile app for anime streaming with AI recommendations

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^17.0.1

  # HTTP & API
  dio: ^5.4.3+1
  google_sign_in: ^6.3.0

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Video Player
  video_player: ^2.9.2
  chewie: ^1.8.1

  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # UI Components
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.1
  equatable: ^2.0.5

  # Additional utilities
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  http: ^1.2.2

  # Internationalization
  flutter_localizations:
    sdk: flutter

  # Animations
  rive: ^0.13.7
  lottie: ^3.1.2
  liquid_swipe: ^3.0.1
  cristalyse: ^0.9.4
  carousel_slider: ^5.1.1
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.13
  custom_lint: ^0.5.8 # Downgrade to avoid analyzer conflict
  mockito: ^5.4.4
  build_test: ^2.1.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
