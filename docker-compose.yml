services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: openanime_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_DATABASE:-anime_player}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: openanime_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Backend API (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openanime_backend
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - DB_DATABASE=${DB_DATABASE:-anime_player}
      - CONSUMET_API_URL=http://consumet:3004
      - MANGAHOOK_API_URL=http://mangahook:5000/api
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_EXPIRES_IN=7d
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Consumet API (anime provider)
  consumet:
    build:
      context: ./consumet-api
      dockerfile: Dockerfile
    container_name: openanime_consumet
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
    restart: unless-stopped

  # MangaHook API (manga provider)
  mangahook:
    build:
      context: ./mangahook-api/server
      dockerfile: Dockerfile
    container_name: openanime_mangahook
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: unless-stopped

  # Web Frontend (Next.js)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is baked at build time. The browser calls this URL,
        # so it must be reachable from the host, not from Docker internal network.
        # Override with: docker compose build --build-arg NEXT_PUBLIC_API_URL=https://api.yourdomain.com web
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3005}
    container_name: openanime_web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: openanime_network
