
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: anime_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-anime_player}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: anime_redis
    restart: always
    ports:
      - "6379:6379"

  consumet:
    build: ./consumet-api
    container_name: anime_consumet
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  backend:
    build: ./backend
    container_name: anime_backend
    restart: always
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - DB_DATABASE=${POSTGRES_DB:-anime_player}
      - GOOGLE_APPLICATION_CREDENTIALS=./serviceAccountKey.json
      # Helper to let backend reach Consumet internally
      - CONSUMET_URL=http://consumet:3000
    depends_on:
      - postgres
      - consumet
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json

volumes:
  pgdata:
