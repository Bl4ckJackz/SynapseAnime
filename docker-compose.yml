services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: openanime_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anime_player
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: openanime_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Backend API (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openanime_backend
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=anime_player
      - CONSUMET_API_URL=http://consumet:3004
      - MANGAHOOK_API_URL=http://mangahook:5000/api
      - JWT_SECRET=${JWT_SECRET:-e5a43253255837da402a1cf144c61f5a}
      - JWT_EXPIRES_IN=7d
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Consumet API (anime provider)
  consumet:
    build:
      context: ./consumet-api
      dockerfile: Dockerfile
    container_name: openanime_consumet
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
    restart: unless-stopped

  # MangaHook API (manga provider)
  mangahook:
    build:
      context: ./mangahook-api/server
      dockerfile: Dockerfile
    container_name: openanime_mangahook
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: openanime_network
